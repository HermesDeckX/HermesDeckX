services:
  hermesdeckx:
    image: hermesdeckx/hermesdeckx:latest
    container_name: hermesdeckx
    init: true
    restart: unless-stopped
    ports:
      - "19700:19788"
    volumes:
      - hermesdeckx-data:/data/hermesdeckx
      # Persist HermesAgent config, state, and logs across container updates
      # HermesAgent is preinstalled in the image; this volume keeps config and runtime data
      # 持久化 HermesAgent 配置、状态与日志，HermesAgent 已预装在镜像中
      - hermesdeckx-hermesagent-data:/data/hermesagent
      # Persist runtime overlay binaries (HermesDeckX/HermesAgent updates) across container recreations
      # 持久化运行时覆盖二进制文件，容器重建后保留更新
      - hermesdeckx-runtime:/data/runtime
    environment:
      OHD_CONFIG: /data/hermesdeckx/HermesDeckX.json
      HERMES_AGENT_HOME: /data/hermesagent/home
      HERMES_AGENT_STATE_DIR: /data/hermesagent/state
      HERMES_AGENT_CONFIG_PATH: /data/hermesagent/state/hermesagent.json
      OHD_HERMES_AGENT_CONFIG_PATH: /data/hermesagent/state
      NPM_CONFIG_PREFIX: /data/hermesagent/npm
      OHD_DB_SQLITE_PATH: /data/hermesdeckx/HermesDeckX.db
      OHD_LOG_FILE: /data/hermesdeckx/HermesDeckX.log
      OHD_GATEWAY_LOG: /data/hermesagent/logs/gateway.log
      OHD_SETUP_INSTALL_LOG: /data/hermesagent/logs/install.log
      OHD_SETUP_DOCTOR_LOG: /data/hermesagent/logs/doctor.log
      OHD_RUNTIME_DIR: /data/runtime
      # HermesAgent Gateway connection config (default: local in-container gateway)
      # 如需连接宿主机或外部 Gateway，可覆盖为 host.docker.internal 或实际 IP
      OHD_HERMES_AGENT_GATEWAY_HOST: 127.0.0.1
      OHD_HERMES_AGENT_GATEWAY_PORT: 18789
      # OHD_HERMES_AGENT_GATEWAY_TOKEN: your_token_here
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:19788/api/v1/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    # Resource limits
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
    # Log rotation: prevent unbounded log growth
    logging:
      driver: json-file
      options:
        max-size: "20m"
        max-file: "3"
    networks:
      - hermesdeckx-net

networks:
  hermesdeckx-net:
    name: hermesdeckx-net
    driver: bridge

volumes:
  hermesdeckx-data:
    name: hermesdeckx-data
  hermesdeckx-hermesagent-data:
    name: hermesagent-data
  hermesdeckx-runtime:
    name: hermesdeckx-runtime
